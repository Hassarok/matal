# MATAL — local development infrastructure.
# Postgres runs by default; Redis is opt-in via the "with-redis" profile:
#   docker compose up -d                     # Postgres only
#   docker compose --profile with-redis up -d  # Postgres + Redis
#
# Credentials/ports are read from the repo-root .env (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: matal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matal_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-matal}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - matal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-matal} -d ${POSTGRES_DB:-matal}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matal-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    profiles: ['with-redis']

volumes:
  matal-postgres-data:
